}

function getTagClass(t) {
  if (t === '近地铁' || t === '地铁上盖') return 'tag tag-metro';
  if (t === '大面积' || t === '可分割') return 'tag tag-hot';
  if (t === '政府补贴' || t === '前海政策' || t === '金融专属') return 'tag tag-policy';
  if (t === '品牌开发商' || t === '品牌物业') return 'tag tag-new';
  return 'tag';
}

function renderList() {
  var filtered = getFiltered();
  var total = filtered.length;
  var totalPages = Math.ceil(total / PAGE_SIZE) || 1;
  if (currentPage > totalPages) currentPage = totalPages;

  var start = (currentPage - 1) * PAGE_SIZE;
  var pageData = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('resultInfo').innerHTML = '共 <strong>' + total + '</strong> 个房源';

  var areaLabels = { 'qianhai':'前海','baoan-center':'宝安中心','xixiang':'西乡','nanshan-tech':'南山科技园' };

  var html = '';
  for (var i = 0; i < pageData.length; i++) {
    var p = pageData[i];
    var areaLabel = areaLabels[p.area] || '';
    var tagHtml = '';
    for (var j = 0; j < p.tags.length && j < 4; j++) {
      var t = p.tags[j];
      tagHtml += '<span class="'+getTagClass(t)+'">'+t+'</span>';
    }

    var rentDisplay = p.rent === '面议' ? '面议' : p.rent + '<small> 元/㎡/月</small>';

    html += '<div class="card" onclick="showDetail('+i+')">'
      +'<div class="card-img"><img src="'+p.img+'" alt="'+p.name+'" onerror="this.style.display=\'none\'">'
      +'<div class="area-badge">'+areaLabel+'</div></div>'
      +'<div class="card-body">'
      +'<h3>'+p.name+'</h3>'
      +'<div class="rent">'+rentDisplay+'</div>'
      +'<div class="rent-note">'+p.rentNote+'</div>'
      +'<div class="info-row"><span class="lbl">面积</span><span>'+p.sizeRange+'㎡</span></div>'
      +'<div class="info-row"><span class="lbl">地铁</span><span>'+p.metro+'</span></div>'
      +'<div class="tags">'+tagHtml+'</div>'
      +'</div></div>';
  }
  document.getElementById('cardGrid').innerHTML = html;

  // 分页
  var pagHtml = '';
  pagHtml += '<button class="page-btn" onclick="goPage('+(currentPage-1)+')"'+(currentPage<=1?' disabled':'')+'>上一页</button>';
  for (var i = 1; i <= totalPages; i++) {
    pagHtml += '<button class="page-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  }
  pagHtml += '<button class="page-btn" onclick="goPage('+(currentPage+1)+')"'+(currentPage>=totalPages?' disabled':'')+'>下一页</button>';
  document.getElementById('pagination').innerHTML = pagHtml;
}

function goPage(n) {
  currentPage = n;
  renderList();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

// ========== 详情弹窗 ==========
function showDetail(idx) {
  var filtered = getFiltered();
  var start = (currentPage - 1) * PAGE_SIZE;
  var p = filtered[start + idx];
  if (!p) return;

  var areaLabels = { 'qianhai':'前海','baoan-center':'宝安中心','xixiang':'西乡','nanshan-tech':'南山科技园' };
  var areaLabel = areaLabels[p.area] || '';

  var hlHtml = '';
  for (var i = 0; i < p.highlights.length; i++) {
    hlHtml += '<li>'+p.highlights[i]+'</li>';
  }

  var tagHtml = '';
  for (var i = 0; i < p.tags.length; i++) {
    tagHtml += '<span class="'+getTagClass(p.tags[i])+'" style="margin-right:6px;">'+p.tags[i]+'</span>';
  }

  var rentDisplay = p.rent === '面议' ? '面议' : p.rent + '<small> 元/㎡/月</small>';

  // modal hero with image
  document.getElementById('modalHero').innerHTML = '<img src="'+p.img+'" alt="'+p.name+'" onerror="this.parentElement.innerHTML=\'<h2>'+p.name+'</h2>\'">';

  document.getElementById('modalContent').innerHTML =
    '<h2 style="font-size:20px;font-weight:700;margin-bottom:12px;">'+p.name+'</h2>'
    +'<div class="rent-big">'+rentDisplay+'</div>'
    +'<div class="rent-note">'+p.rentNote+'</div>'
    +'<div style="margin-bottom:12px;">'+tagHtml+'</div>'
    +'<div class="info-grid">'
    +'<div class="info-cell"><div class="lbl">区域</div><div class="val">'+areaLabel+'</div></div>'
    +'<div class="info-cell"><div class="lbl">可租面积</div><div class="val">'+p.sizeRange+'㎡</div></div>'
    +'<div class="info-cell"><div class="lbl">地址</div><div class="val" style="font-size:13px;">'+p.address+'</div></div>'
    +'<div class="info-cell"><div class="lbl">最近地铁</div><div class="val" style="font-size:13px;">'+p.metro+'</div></div>'
    +'<div class="info-cell"><div class="lbl">开发商</div><div class="val" style="font-size:13px;">'+p.developer+'</div></div>'
    +'<div class="info-cell"><div class="lbl">物业公司</div><div class="val" style="font-size:13px;">'+p.property+'</div></div>'
    +'<div class="info-cell"><div class="lbl">楼层数</div><div class="val">'+p.floors+'</div></div>'
    +'</div>'
    +'<div class="highlights"><h4>楼盘亮点</h4><ul>'+hlHtml+'</ul></div>'
    +'<div class="contact-box">'
    +'<div>专业经纪人 · 一对一服务</div>'
    +'<div class="phone">'+p.contact+'</div>'
    +'<div class="wechat">微信同号，随时预约看房</div>'
    +'</div>';

  document.getElementById('detailModal').classList.add('show');
}
function closeDetail() { document.getElementById('detailModal').classList.remove('show'); }
document.getElementById('detailModal').addEventListener('click', function(e) { if (e.target === this) closeDetail(); });

// ========== 筛选按钮绑定 ==========
function bindFilter(containerId, callback) {
  var btns = document.getElementById(containerId).querySelectorAll('.filter-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].addEventListener('click', function() {
      var siblings = this.parentElement.querySelectorAll('.filter-btn');
      for (var j = 0; j < siblings.length; j++) siblings[j].classList.remove('active');
      this.classList.add('active');
      callback(this.getAttribute('data-val'));
    });
  }
}
bindFilter('areaFilter', function(v) { filterArea = v; currentPage = 1; renderList(); });
document.getElementById('searchInput').addEventListener('input', function() {
  searchText = this.value.trim(); currentPage = 1; renderList();
});

// ========== 动态生成 JSON-LD ==========
function updateJsonLd() {
  var items = [];
  for (var i = 0; i < properties.length; i++) {
    var p = properties[i];
    var priceNum = 0;
    if (p.rent !== '面议') {
      var match = p.rent.match(/(\d+)/);
      if (match) priceNum = parseInt(match[1]);
    }
    items.push({
      "@type": "ListItem",
      "position": i + 1,
      "item": {
        "@type": "RealEstateListing",
        "name": p.name,
        "description": p.name + "，位于" + p.address + "，" + p.metro + (p.rent !== '面议' ? "，租金" + p.rent + "元/㎡/月" : "，租金面议") + "，" + p.sizeRange + "㎡可租",
        "url": "https://lverlyly.github.io/work-tracker/office.html",
        "image": "https://lverlyly.github.io/work-tracker/" + p.img,
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "深圳",
          "addressRegion": "广东",
          "streetAddress": p.address
        },
        "priceSpecification": priceNum > 0 ? {
          "@type": "UnitPriceSpecification",
          "price": priceNum,
          "priceCurrency": "CNY",
          "unitCode": "MTK",
          "description": "元/㎡/月"
        } : undefined
      }
    });
  }
  var jsonLd = {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "深圳宝安南山写字楼出租精选",
    "description": "深圳宝安南山区优质写字楼办公室租赁房源列表",
    "numberOfItems": properties.length,
    "itemListElement": items
  };
  var script = document.querySelector('script[type="application/ld+json"]');
  if (script) script.textContent = JSON.stringify(jsonLd);
}
updateJsonLd();

renderList();
</script>
