<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房源管理后台</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:#f0f2f5; color:#1a1a2e; -webkit-font-smoothing:antialiased;
    }

    /* ===== 登录页 ===== */
    .login-wrap {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .login-box {
      background:#fff; border-radius:16px; padding:40px; width:90%; max-width:360px;
      box-shadow:0 20px 60px rgba(0,0,0,.3); text-align:center;
    }
    .login-box h2 { font-size:22px; margin-bottom:8px; }
    .login-box .sub { font-size:13px; color:#7f8c9b; margin-bottom:24px; }
    .login-box input[type="password"] {
      width:100%; border:1.5px solid #e8ecf1; border-radius:10px; padding:12px 16px;
      font-size:15px; outline:none; font-family:inherit; text-align:center; letter-spacing:4px;
    }
    .login-box input[type="password"]:focus { border-color:#4f6ef7; }
    .login-box .pwd-input { margin-bottom:10px; }
    .login-box .login-btn {
      width:100%; margin-top:16px; padding:12px; border:none; border-radius:10px;
      background:#4f6ef7; color:#fff; font-size:16px; font-weight:600; cursor:pointer;
      font-family:inherit;
    }
    .login-box .login-btn:hover { background:#3d5bd6; }
    .login-box .login-btn:disabled { opacity:.5; cursor:not-allowed; }
    .login-box .err { color:#f56c6c; font-size:12px; margin-top:8px; display:none; }
    .login-box .hint { margin-top:12px; font-size:11px; color:#b0b8c4; }

    /* ===== 管理后台 ===== */
    .admin { display:none; }
    .admin-header {
      background:#fff; padding:16px 24px; border-bottom:1px solid #e8ecf1;
      display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;
    }
    .admin-header h1 { font-size:18px; font-weight:700; }
    .admin-header .actions { display:flex; gap:10px; }
    .admin-tabs { display:flex; gap:0; margin-bottom:0; }
    .admin-tab {
      padding:8px 18px; border:1.5px solid #e8ecf1; border-bottom:none; border-radius:8px 8px 0 0;
      font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; background:#f5f6fa; color:#7f8c9b;
    }
    .admin-tab.active { background:#fff; color:#4f6ef7; border-color:#4f6ef7; border-bottom:1px solid #fff; margin-bottom:-1px; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .btn {
      padding:8px 18px; border:none; border-radius:8px; font-size:13px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:all .15s;
    }
    .btn-primary { background:#4f6ef7; color:#fff; }
    .btn-primary:hover { background:#3d5bd6; }
    .btn-success { background:#67c23a; color:#fff; }
    .btn-success:hover { background:#5daf34; }
    .btn-danger { background:#f56c6c; color:#fff; }
    .btn-danger:hover { background:#dd5a5a; }
    .btn-outline { background:#fff; color:#7f8c9b; border:1.5px solid #e8ecf1; }
    .btn-outline:hover { border-color:#4f6ef7; color:#4f6ef7; }
    .btn-sm { padding:5px 12px; font-size:12px; }
    .btn:disabled { opacity:.5; pointer-events:none; }

    .admin-body { max-width:900px; margin:0 auto; padding:20px; padding-bottom:60px; }

    /* 楼盘列表 */
    .prop-list { display:flex; flex-direction:column; gap:12px; }
    .prop-item {
      background:#fff; border-radius:12px; padding:16px; display:flex; gap:16px;
      align-items:center; box-shadow:0 1px 4px rgba(0,0,0,.04); transition:box-shadow .15s;
    }
    .prop-item:hover { box-shadow:0 4px 12px rgba(0,0,0,.08); }
    .prop-thumb {
      width:80px; height:60px; border-radius:8px; overflow:hidden; flex-shrink:0;
      background:linear-gradient(135deg,#e8ecf1,#d5dae3); display:flex; align-items:center; justify-content:center;
    }
    .prop-thumb img { width:100%; height:100%; object-fit:cover; }
    .prop-thumb .no-img { font-size:10px; color:#b0b8c4; }
    .prop-info { flex:1; min-width:0; }
    .prop-info h3 { font-size:15px; font-weight:600; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .prop-info .meta { font-size:12px; color:#7f8c9b; display:flex; gap:12px; flex-wrap:wrap; }
    .prop-info .meta span { white-space:nowrap; }
    .prop-actions { display:flex; gap:6px; flex-shrink:0; }

    /* 编辑弹窗 */
    .overlay {
      position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5);
      z-index:1000; display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .overlay.show { opacity:1; pointer-events:auto; }
    .edit-box {
      background:#fff; border-radius:16px; width:94%; max-width:560px; max-height:90vh;
      overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2);
    }
    .edit-header {
      padding:20px 24px 0; display:flex; align-items:center; justify-content:space-between;
    }
    .edit-header h2 { font-size:18px; font-weight:700; }
    .edit-close {
      background:none; border:none; font-size:24px; cursor:pointer; color:#7f8c9b; padding:4px;
    }
    .edit-body { padding:20px 24px 24px; }
    .form-group { margin-bottom:16px; }
    .form-group label {
      display:block; font-size:12px; font-weight:600; color:#7f8c9b; margin-bottom:6px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; border:1.5px solid #e8ecf1; border-radius:8px; padding:10px 12px;
      font-size:14px; font-family:inherit; outline:none; color:#1a1a2e;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color:#4f6ef7;
    }
    .form-group textarea { resize:vertical; min-height:60px; }
    .form-row { display:flex; gap:12px; }
    .form-row .form-group { flex:1; }
    .img-upload-area {
      border:2px dashed #e8ecf1; border-radius:12px; padding:24px; text-align:center;
      cursor:pointer; transition:border-color .15s; position:relative; overflow:hidden;
    }
    .img-upload-area:hover { border-color:#4f6ef7; }
    .img-upload-area img { width:100%; max-height:160px; object-fit:contain; border-radius:8px; }
    .img-upload-area .upload-hint { font-size:13px; color:#b0b8c4; }
    .img-upload-area .upload-hint small { display:block; font-size:11px; margin-top:4px; }
    .img-upload-area input[type="file"] {
      position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;
    }

    /* 发布状态 */
    .publish-bar {
      background:#fff; border-top:1px solid #e8ecf1; padding:12px 24px;
      position:fixed; bottom:0; left:0; right:0; display:flex; align-items:center;
      justify-content:space-between; z-index:50; box-shadow:0 -2px 8px rgba(0,0,0,.04);
    }
    .publish-bar .status { font-size:13px; color:#7f8c9b; }
    .publish-bar .status .changed { color:#e6a23c; font-weight:600; }
    .publish-bar .status .published { color:#67c23a; font-weight:600; }

    /* 提示条 */
    .toast {
      position:fixed; top:20px; left:50%; -webkit-transform:translateX(-50%) translateY(-80px);
      transform:translateX(-50%) translateY(-80px);
      background:#1a1a2e; color:#fff; padding:12px 24px; border-radius:10px; font-size:14px;
      font-weight:600; z-index:9999; -webkit-transition:-webkit-transform .3s;
      transition:transform .3s; box-shadow:0 8px 24px rgba(0,0,0,.2);
    }
    .toast.show { -webkit-transform:translateX(-50%) translateY(0); transform:translateX(-50%) translateY(0); }
    .toast.success { background:#67c23a; }
    .toast.error { background:#f56c6c; }

    /* 响应式 */
    @media (max-width:600px) {
      .admin-header { flex-direction:column; gap:10px; }
      .prop-item { flex-direction:column; align-items:flex-start; }
      .prop-actions { width:100%; justify-content:flex-end; }
      .form-row { flex-direction:column; gap:0; }
      .edit-box { width:100%; max-width:100%; max-height:100vh; border-radius:0; }
    }
  </style>
</head>
<body>

<!-- 登录页 -->
<div class="login-wrap" id="loginPage">
  <div class="login-box">
    <h2>房源管理后台</h2>
    <div class="sub">请输入管理密码和发布令牌</div>
    <input type="password" id="loginPwd" placeholder="管理密码" class="pwd-input" autofocus>
    <input type="password" id="loginToken" placeholder="GitHub发布令牌（ghp_开头）">
    <div class="err" id="loginErr">密码错误，请重试</div>
    <button class="login-btn" id="loginBtn">进入后台</button>
    <div class="hint">发布令牌仅在本次会话中使用，不会保存</div>
  </div>
</div>

<!-- 管理后台 -->
<div class="admin" id="adminPage">
  <div class="admin-header">
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="props">楼盘管理</button>
      <button class="admin-tab" data-tab="settings">站点设置</button>
    </div>
    <div class="actions">
      <button class="btn btn-outline" id="logoutBtn">退出</button>
    </div>
  </div>
  <div class="admin-body">
    <!-- 楼盘管理 -->
    <div class="tab-content active" id="tabProps">
      <div style="margin-bottom:12px;"><button class="btn btn-primary" id="addBtn">+ 新增楼盘</button></div>
      <div class="prop-list" id="propList"></div>
    </div>
    <!-- 站点设置 -->
    <div class="tab-content" id="tabSettings">
      <div class="form-group">
        <label>页面标题（高亮部分）</label>
        <input type="text" id="sHeroTitle" placeholder="如：深圳宝安·南山">
      </div>
      <div class="form-group">
        <label>标题高亮文字</label>
        <input type="text" id="sHeroHighlight" placeholder="如：写字楼真实房源">
      </div>
      <div class="form-group">
        <label>副标题</label>
        <input type="text" id="sHeroSubtitle" placeholder="如：真实楼盘 · 免费带看 · 一对一服务">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>联系电话</label>
          <input type="text" id="sPhone" placeholder="如：13500000000">
        </div>
        <div class="form-group">
          <label>微信二维码图片</label>
          <div class="img-upload-area" id="qrUploadArea" style="padding:12px;">
            <div class="upload-hint" id="qrUploadHint">点击上传二维码<small>建议200x200以上</small></div>
            <input type="file" accept="image/*" id="qrFileInput">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>底部标题</label>
        <input type="text" id="sFooterTitle" placeholder="如：深圳宝安南山写字楼租赁服务">
      </div>
      <div class="form-group">
        <label>底部描述1</label>
        <textarea id="sFooterDesc" rows="3" placeholder="主要介绍文字"></textarea>
      </div>
      <div class="form-group">
        <label>底部描述2</label>
        <textarea id="sFooterDesc2" rows="2" placeholder="补充说明"></textarea>
      </div>
      <div class="form-group">
        <label>区域列表（每行一个，格式：key:名称:hot，hot表示热门）</label>
        <textarea id="sAreas" rows="4" placeholder="qianhai:前海:hot&#10;baoan-center:宝安中心:hot&#10;xixiang:西乡:hot&#10;nanshan-tech:南山科技园:hot"></textarea>
      </div>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="saveSettingsBtn">保存设置</button>
      </div>
    </div>
  </div>
  <div class="publish-bar">
    <div class="status" id="pubStatus">点击发布同步到线上</div>
    <button class="btn btn-success" id="pubBtn">发布到线上</button>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="overlay" id="editOverlay">
  <div class="edit-box">
    <div class="edit-header">
      <h2 id="editTitle">编辑楼盘</h2>
      <button class="edit-close" id="editCloseBtn">&times;</button>
    </div>
    <div class="edit-body">
      <div class="form-group">
        <label>楼盘图片</label>
        <div class="img-upload-area" id="uploadArea">
          <div class="upload-hint" id="uploadHint">
            点击上传图片
            <small>建议宽度1080px以上，支持jpg/png</small>
          </div>
          <input type="file" accept="image/*" id="imgFileInput">
        </div>
      </div>
      <div class="form-group">
        <label>楼盘名称</label>
        <input type="text" id="fName" placeholder="如：华润前海金融中心">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>区域</label>
          <select id="fArea"></select>
        </div>
        <div class="form-group">
          <label>租金（元/㎡/月）</label>
          <input type="text" id="fRent" placeholder="如：160-270 或 面议">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>租金说明</label>
          <input type="text" id="fRentNote" placeholder="如：含税含物业">
        </div>
        <div class="form-group">
          <label>面积范围（㎡）</label>
          <input type="text" id="fSize" placeholder="如：160-5000">
        </div>
      </div>
      <div class="form-group">
        <label>详细地址</label>
        <input type="text" id="fAddr" placeholder="如：前海自由贸易区梦海大道与桂湾四路交汇处">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>最近地铁</label>
          <input type="text" id="fMetro" placeholder="如：5号线桂湾站">
        </div>
        <div class="form-group">
          <label>联系电话</label>
          <input type="text" id="fContact" placeholder="如：13500000000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>开发商</label>
          <input type="text" id="fDev" placeholder="选填">
        </div>
        <div class="form-group">
          <label>物业公司</label>
          <input type="text" id="fProp" placeholder="选填">
        </div>
      </div>
      <div class="form-group">
        <label>楼层数</label>
        <input type="text" id="fFloors" placeholder="选填，如：53层">
      </div>
      <div class="form-group">
        <label>标签（逗号分隔）</label>
        <input type="text" id="fTags" placeholder="如：超甲级,近地铁,品牌开发商">
      </div>
      <div class="form-group">
        <label>楼盘亮点（每行一条）</label>
        <textarea id="fHighlights" rows="4" placeholder="每行一条亮点"></textarea>
      </div>
      <div class="form-row" style="justify-content:flex-end;margin-top:20px;">
        <button class="btn btn-outline" id="editCancelBtn">取消</button>
        <button class="btn btn-primary" id="editSaveBtn">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- data.js跟office.html共享同一个文件，直接用script标签加载 -->
<script src="data.js"></script>
<script>
// ========== 配置 ==========
var ADMIN_PWD = 'baoan2026';
var GITHUB_TOKEN = '';
var GITHUB_REPO = 'lverlyly/work-tracker';
var GITHUB_BRANCH = 'main';
var STORAGE_KEY = 'office_properties';
var CONFIG_KEY = 'office_siteconfig';
var HAS_CHANGES = false;
var pendingImages = {};
var pendingQrImage = null;
var editingIndex = -1;

// ========== 数据初始化 ==========
// data.js 已经定义了全局变量 siteConfig 和 properties
// 如果data.js加载失败（比如离线），用localStorage兜底
if (typeof siteConfig === 'undefined') {
  var savedCfg = localStorage.getItem(CONFIG_KEY);
  var savedProps = localStorage.getItem(STORAGE_KEY);
  var siteConfig = savedCfg ? JSON.parse(savedCfg) : {
    heroTitle: '深圳宝安·南山', heroHighlight: '写字楼真实房源',
    heroSubtitle: '真实楼盘 · 免费带看 · 一对一服务',
    footerTitle: '深圳宝安南山写字楼租赁服务',
    footerDesc: '我们专注深圳宝安区、南山区写字楼办公室租赁。',
    footerDesc2: '专业经纪人一对一服务。',
    phone: '13500000000', wechatQrImg: '',
    areas: [{key:'qianhai',label:'前海',hot:true},{key:'baoan-center',label:'宝安中心',hot:true},{key:'xixiang',label:'西乡',hot:true},{key:'nanshan-tech',label:'南山科技园',hot:true}]
  };
  var properties = savedProps ? JSON.parse(savedProps) : [];
}

// ========== 获取区域标签映射 ==========
function getAreaLabels() {
  var labels = {};
  if (siteConfig && siteConfig.areas) {
    for (var i = 0; i < siteConfig.areas.length; i++) {
      labels[siteConfig.areas[i].key] = siteConfig.areas[i].label;
    }
  }
  return labels;
}

// ========== 数据管理 ==========
function savePropList(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  markChanged();
}

function saveSiteConfig(cfg) {
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
  markChanged();
}

// ========== Toast ==========
var toastTimer = null;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = 'toast'; }, 3000);
}

// ========== 登录 ==========
function tryLogin() {
  var pwd = document.getElementById('loginPwd').value;
  var token = document.getElementById('loginToken').value.trim();
  if (pwd === ADMIN_PWD) {
    GITHUB_TOKEN = token;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    renderList();
    if (!token) {
      showToast('未输入发布令牌，编辑可用但无法发布', 'error');
    } else {
      showToast('已加载线上数据', 'success');
    }
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginPwd').value = '';
    document.getElementById('loginPwd').focus();
  }
}

function logout() {
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginPwd').value = '';
  document.getElementById('loginToken').value = '';
}

// ========== 列表渲染 ==========
function renderList() {
  var areaLabels = getAreaLabels();
  var html = '';
  for (var i = 0; i < properties.length; i++) {
    var p = properties[i];
    var areaLabel = areaLabels[p.area] || p.area;
    var rentLabel = p.rent === '面议' ? '面议' : p.rent + ' 元/㎡/月';
    var imgHtml = p.img ? '<img src="' + p.img + '" alt="' + p.name + '">' : '<div class="no-img">无图</div>';

    html += '<div class="prop-item">'
      + '<div class="prop-thumb">' + imgHtml + '</div>'
      + '<div class="prop-info">'
      + '<h3>' + p.name + '</h3>'
      + '<div class="meta">'
      + '<span>' + areaLabel + '</span>'
      + '<span>' + rentLabel + '</span>'
      + '<span>' + p.metro + '</span>'
      + '</div></div>'
      + '<div class="prop-actions">'
      + '<button class="btn btn-outline btn-sm" data-edit="' + i + '">编辑</button>'
      + '<button class="btn btn-danger btn-sm" data-del="' + i + '">删除</button>'
      + '</div></div>';
  }
  if (properties.length === 0) {
    html = '<div style="text-align:center;padding:60px 20px;color:#b0b8c4;">暂无楼盘，点击右上角新增楼盘添加</div>';
  }
  document.getElementById('propList').innerHTML = html;
}

// 事件代理 - 列表按钮
document.getElementById('propList').addEventListener('click', function(e) {
  var el = e.target;
  while (el && el !== this) {
    if (el.getAttribute('data-edit') !== null) {
      openEdit(parseInt(el.getAttribute('data-edit')));
      return;
    }
    if (el.getAttribute('data-del') !== null) {
      deleteProp(parseInt(el.getAttribute('data-del')));
      return;
    }
    el = el.parentNode;
  }
});

// ========== 动态生成区域下拉框 ==========
function updateAreaSelect(selectedArea) {
  var select = document.getElementById('fArea');
  var html = '';
  if (siteConfig && siteConfig.areas) {
    for (var i = 0; i < siteConfig.areas.length; i++) {
      var a = siteConfig.areas[i];
      var sel = (a.key === selectedArea) ? ' selected' : '';
      html += '<option value="' + a.key + '"' + sel + '>' + a.label + '</option>';
    }
  }
  if (selectedArea && html.indexOf('value="' + selectedArea + '"') < 0) {
    html += '<option value="' + selectedArea + '" selected>' + selectedArea + '</option>';
  }
  if (!html) html = '<option value="qianhai">前海</option>';
  select.innerHTML = html;
}

// ========== 编辑弹窗 ==========
function openEdit(idx) {
  editingIndex = idx;
  var p = idx >= 0 ? properties[idx] : null;

  document.getElementById('editTitle').textContent = p ? '编辑楼盘' : '新增楼盘';
  document.getElementById('fName').value = p ? p.name : '';
  updateAreaSelect(p ? p.area : 'qianhai');
  document.getElementById('fRent').value = p ? p.rent : '';
  document.getElementById('fRentNote').value = p ? p.rentNote : '';
  document.getElementById('fSize').value = p ? p.sizeRange : '';
  document.getElementById('fAddr').value = p ? p.address : '';
  document.getElementById('fMetro').value = p ? p.metro : '';
  document.getElementById('fContact').value = p ? p.contact : (siteConfig.phone || '13500000000');
  document.getElementById('fDev').value = p ? p.developer : '';
  document.getElementById('fProp').value = p ? p.property : '';
  document.getElementById('fFloors').value = p ? p.floors : '';
  document.getElementById('fTags').value = p ? p.tags.join(',') : '';
  document.getElementById('fHighlights').value = p ? p.highlights.join('\n') : '';

  var uploadHint = document.getElementById('uploadHint');
  if (p && p.img && p.img.indexOf('data:') !== 0) {
    uploadHint.innerHTML = '<img src="' + p.img + '" alt="预览"><small>点击重新上传</small>';
  } else if (p && p.img && p.img.indexOf('data:') === 0) {
    uploadHint.innerHTML = '<img src="' + p.img + '" alt="预览"><small>已选新图片，点击重新上传</small>';
  } else {
    uploadHint.innerHTML = '点击上传图片<small>建议宽度1080px以上，支持jpg/png</small>';
  }
  document.getElementById('imgFileInput').value = '';

  document.getElementById('editOverlay').classList.add('show');
}

function closeEdit() {
  document.getElementById('editOverlay').classList.remove('show');
  editingIndex = -1;
  pendingImages = {};
}

// 图片选择
document.getElementById('imgFileInput').addEventListener('change', function() {
  if (!this.files || !this.files[0]) return;
  var file = this.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result;
    var uploadHint = document.getElementById('uploadHint');
    uploadHint.innerHTML = '<img src="' + base64 + '" alt="预览"><small>已选择新图片，保存时生效</small>';
    pendingImages[editingIndex] = base64;
  };
  reader.readAsDataURL(file);
});

function saveEdit() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { showToast('请输入楼盘名称', 'error'); return; }

  var tagsStr = document.getElementById('fTags').value.trim();
  var tags = tagsStr ? tagsStr.split(/[,，]/).filter(function(t){ return t.trim() !== ''; }) : [];
  var highlightsStr = document.getElementById('fHighlights').value.trim();
  var highlights = highlightsStr ? highlightsStr.split('\n').filter(function(h){ return h.trim() !== ''; }) : [];

  var p = {
    name: name,
    area: document.getElementById('fArea').value,
    rent: document.getElementById('fRent').value.trim() || '面议',
    rentNote: document.getElementById('fRentNote').value.trim(),
    sizeRange: document.getElementById('fSize').value.trim(),
    address: document.getElementById('fAddr').value.trim(),
    metro: document.getElementById('fMetro').value.trim(),
    tags: tags,
    highlights: highlights,
    img: '',
    developer: document.getElementById('fDev').value.trim() || '面议',
    property: document.getElementById('fProp').value.trim() || '面议',
    floors: document.getElementById('fFloors').value.trim() || '面议',
    contact: document.getElementById('fContact').value.trim() || (siteConfig.phone || '13500000000'),
    updatedAt: Date.now(),
    _imgPending: false
  };

  if (pendingImages[editingIndex]) {
    p.img = pendingImages[editingIndex];
    p._imgPending = true;
  } else if (editingIndex >= 0 && properties[editingIndex]) {
    p.img = properties[editingIndex].img;
    p._imgPending = properties[editingIndex]._imgPending || false;
  }

  if (editingIndex >= 0) {
    properties[editingIndex] = p;
  } else {
    properties.push(p);
  }

  savePropList(properties);
  renderList();
  closeEdit();
  showToast('已保存，记得点发布同步到线上', 'success');
}

function deleteProp(idx) {
  if (!confirm('确定删除"' + properties[idx].name + '"？')) return;
  properties.splice(idx, 1);
  savePropList(properties);
  renderList();
  showToast('已删除', 'success');
}

// ========== 变更追踪 ==========
function markChanged() {
  HAS_CHANGES = true;
  document.getElementById('pubStatus').innerHTML = '<span class="changed">有未发布的修改</span>';
}

// ========== 发布到GitHub ==========
function publishAll() {
  if (!GITHUB_TOKEN) {
    showToast('请先输入GitHub发布令牌才能发布', 'error');
    return;
  }

  var btn = document.getElementById('pubBtn');
  btn.disabled = true;
  btn.textContent = '发布中...';

  uploadPendingImages(0, function() {
    uploadQrImage(function() {
      pushDataJs(function(err) {
        if (err) {
          showToast('发布失败：' + err, 'error');
          btn.disabled = false;
          btn.textContent = '发布到线上';
        } else {
          HAS_CHANGES = false;
          localStorage.setItem(CONFIG_KEY, JSON.stringify(siteConfig));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(properties));
          document.getElementById('pubStatus').innerHTML = '<span class="published">已发布到线上</span>';
          showToast('发布成功！30秒后线上更新，可刷新主页验证', 'success');
          btn.textContent = '发布到线上';
          btn.disabled = false;
          triggerPagesBuild();
        }
      });
    });
  });
}

// 触发GitHub Pages重建
function triggerPagesBuild() {
  if (!GITHUB_TOKEN) return;
  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://api.github.com/repos/' + GITHUB_REPO + '/pages/builds');
  xhr.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
  xhr.setRequestHeader('Accept', 'application/vnd.github.v3+json');
  xhr.send();
}

// 递归上传待处理的图片
function uploadPendingImages(index, callback) {
  while (index < properties.length) {
    var p = properties[index];
    if (p._imgPending && p.img && p.img.indexOf('data:') === 0) break;
    index++;
  }
  if (index >= properties.length) { callback(); return; }

  var p = properties[index];
  var base64Data = p.img;
  var parts = base64Data.split(',');
  var mimeType = parts[0].match(/:(.*?);/);
  var ext = 'jpg';
  if (mimeType && mimeType[1]) {
    if (mimeType[1] === 'image/png') ext = 'png';
    else if (mimeType[1] === 'image/webp') ext = 'webp';
  }
  var rawBase64 = parts[1];
  var filename = 'images/upload_' + Date.now() + '_' + index + '.' + ext;

  var xhr = new XMLHttpRequest();
  xhr.open('PUT', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + filename);
  xhr.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    if (xhr.status === 201 || xhr.status === 200) {
      properties[index].img = filename;
      properties[index]._imgPending = false;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(properties));
      renderList();
      uploadPendingImages(index + 1, callback);
    } else {
      showToast('图片上传失败', 'error');
      callback();
    }
  };
  xhr.onerror = function() { callback(); };
  xhr.send(JSON.stringify({ message: '上传图片: ' + filename, branch: GITHUB_BRANCH, content: rawBase64 }));
}

// 上传微信二维码到GitHub
function uploadQrImage(callback) {
  if (!siteConfig._qrPending || !siteConfig.wechatQrImg || siteConfig.wechatQrImg.indexOf('data:') !== 0) {
    callback();
    return;
  }
  var base64Data = siteConfig.wechatQrImg;
  var parts = base64Data.split(',');
  var mimeType = parts[0].match(/:(.*?);/);
  var ext = 'jpg';
  if (mimeType && mimeType[1]) { if (mimeType[1] === 'image/png') ext = 'png'; }
  var rawBase64 = parts[1];
  var filename = 'images/wechat_qr.' + ext;

  // 先获取旧文件的SHA
  var xhr0 = new XMLHttpRequest();
  xhr0.open('GET', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + filename + '?ref=' + GITHUB_BRANCH);
  xhr0.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
  xhr0.setRequestHeader('Accept', 'application/vnd.github.v3+json');
  xhr0.onload = function() {
    var sha = null;
    if (xhr0.status === 200) { try { sha = JSON.parse(xhr0.responseText).sha; } catch(e) {} }
    doUploadQr(filename, rawBase64, sha, callback);
  };
  xhr0.onerror = function() { doUploadQr(filename, rawBase64, null, callback); };
  xhr0.send();
}

function doUploadQr(filename, rawBase64, sha, callback) {
  var payload = { message: '上传微信二维码', branch: GITHUB_BRANCH, content: rawBase64 };
  if (sha) payload.sha = sha;
  var xhr = new XMLHttpRequest();
  xhr.open('PUT', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + filename);
  xhr.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    if (xhr.status === 201 || xhr.status === 200) {
      siteConfig.wechatQrImg = filename;
      siteConfig._qrPending = false;
      localStorage.setItem(CONFIG_KEY, JSON.stringify(siteConfig));
    }
    callback();
  };
  xhr.onerror = function() { callback(); };
  xhr.send(JSON.stringify(payload));
}

// ========== 推送data.js ==========
function pushDataJs(callback) {
  var content = 'var siteConfig = {\n';
  content += "  heroTitle: '" + (siteConfig.heroTitle || '').replace(/'/g, "\\'") + "',\n";
  content += "  heroHighlight: '" + (siteConfig.heroHighlight || '').replace(/'/g, "\\'") + "',\n";
  content += "  heroSubtitle: '" + (siteConfig.heroSubtitle || '').replace(/'/g, "\\'") + "',\n";
  content += "  footerTitle: '" + (siteConfig.footerTitle || '').replace(/'/g, "\\'") + "',\n";
  content += "  footerDesc: '" + (siteConfig.footerDesc || '').replace(/'/g, "\\'") + "',\n";
  content += "  footerDesc2: '" + (siteConfig.footerDesc2 || '').replace(/'/g, "\\'") + "',\n";
  content += "  phone: '" + (siteConfig.phone || '') + "',\n";
  content += "  wechatQrImg: '" + (siteConfig.wechatQrImg || '') + "',\n";
  content += '  areas: [\n';
  for (var i = 0; i < siteConfig.areas.length; i++) {
    var a = siteConfig.areas[i];
    content += "    {key: '" + a.key + "', label: '" + (a.label || '').replace(/'/g, "\\'") + "', hot: " + (a.hot ? 'true' : 'false') + "}" + (i < siteConfig.areas.length - 1 ? ',' : '') + '\n';
  }
  content += '  ]\n};\n\n';

  content += 'var properties = [\n';
  for (var i = 0; i < properties.length; i++) {
    var p = properties[i];
    var tagsCode = '[';
    for (var j = 0; j < p.tags.length; j++) {
      tagsCode += "'" + p.tags[j].replace(/'/g, "\\'") + "'";
      if (j < p.tags.length - 1) tagsCode += ',';
    }
    tagsCode += ']';
    var hlCode = '[';
    for (var j = 0; j < p.highlights.length; j++) {
      hlCode += "'" + p.highlights[j].replace(/'/g, "\\'") + "'";
      if (j < p.highlights.length - 1) hlCode += ',';
    }
    hlCode += ']';
    content += "  {name:'" + p.name.replace(/'/g, "\\'") + "',area:'" + p.area + "',rent:'" + (p.rent || '面议') + "',rentNote:'" + (p.rentNote || '').replace(/'/g, "\\'") + "',sizeRange:'" + (p.sizeRange || '').replace(/'/g, "\\'") + "',address:'" + (p.address || '').replace(/'/g, "\\'") + "',metro:'" + (p.metro || '').replace(/'/g, "\\'") + "',tags:" + tagsCode + ",highlights:" + hlCode + ",img:'" + (p.img || '') + "',developer:'" + (p.developer || '面议').replace(/'/g, "\\'") + "',property:'" + (p.property || '面议').replace(/'/g, "\\'") + "',floors:'" + (p.floors || '面议').replace(/'/g, "\\'") + "',contact:'" + (p.contact || siteConfig.phone || '13500000000') + "',updatedAt:" + (p.updatedAt || Date.now()) + "}" + (i < properties.length - 1 ? ',' : '') + '\n';
  }
  content += '];\n';

  // 获取当前data.js的SHA
  var xhr0 = new XMLHttpRequest();
  xhr0.open('GET', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/data.js?ref=' + GITHUB_BRANCH);
  xhr0.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
  xhr0.setRequestHeader('Accept', 'application/vnd.github.v3+json');
  xhr0.onload = function() {
    var sha = null;
    if (xhr0.status === 200) { try { sha = JSON.parse(xhr0.responseText).sha; } catch(e) {} }
    doPushDataJs(content, sha, callback);
  };
  xhr0.onerror = function() { doPushDataJs(content, null, callback); };
  xhr0.send();
}

function doPushDataJs(content, sha, callback) {
  var encoded = utf8ToBase64(content);
  var payload = { message: '更新房源数据 ' + new Date().toLocaleString(), branch: GITHUB_BRANCH, content: encoded };
  if (sha) payload.sha = sha;

  var xhr = new XMLHttpRequest();
  xhr.open('PUT', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/data.js');
  xhr.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onload = function() {
    if (xhr.status === 200 || xhr.status === 201) {
      callback(null);
    } else {
      var msg = 'HTTP ' + xhr.status;
      try { var r = JSON.parse(xhr.responseText); if (r.message) msg += ': ' + r.message; } catch(e) {}
      callback(msg);
    }
  };
  xhr.onerror = function() { callback('网络错误'); };
  xhr.send(JSON.stringify(payload));
}

// UTF-8安全的Base64编码
function utf8ToBase64(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
    return String.fromCharCode('0x' + p1);
  }));
}

// ========== 事件绑定 ==========
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('loginPwd').addEventListener('keydown', function(e) { if (e.keyCode === 13) tryLogin(); });
document.getElementById('loginToken').addEventListener('keydown', function(e) { if (e.keyCode === 13) tryLogin(); });
document.getElementById('logoutBtn').addEventListener('click', logout);
document.getElementById('addBtn').addEventListener('click', function() { openEdit(-1); });
document.getElementById('editCloseBtn').addEventListener('click', closeEdit);
document.getElementById('editCancelBtn').addEventListener('click', closeEdit);
document.getElementById('editSaveBtn').addEventListener('click', saveEdit);
document.getElementById('pubBtn').addEventListener('click', publishAll);
document.getElementById('editOverlay').addEventListener('click', function(e) { if (e.target === this) closeEdit(); });

// ========== Tab切换 ==========
document.querySelector('.admin-tabs').addEventListener('click', function(e) {
  var tab = e.target;
  if (!tab.getAttribute('data-tab')) return;
  var tabName = tab.getAttribute('data-tab');
  var tabs = document.querySelectorAll('.admin-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  tab.classList.add('active');
  var contents = document.querySelectorAll('.tab-content');
  for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
  document.getElementById('tab' + tabName.charAt(0).toUpperCase() + tabName.slice(1)).classList.add('active');
  if (tabName === 'settings') loadSettingsForm();
});

// ========== 站点设置 ==========
function loadSettingsForm() {
  if (!siteConfig) return;
  document.getElementById('sHeroTitle').value = siteConfig.heroTitle || '';
  document.getElementById('sHeroHighlight').value = siteConfig.heroHighlight || '';
  document.getElementById('sHeroSubtitle').value = siteConfig.heroSubtitle || '';
  document.getElementById('sPhone').value = siteConfig.phone || '';
  document.getElementById('sFooterTitle').value = siteConfig.footerTitle || '';
  document.getElementById('sFooterDesc').value = siteConfig.footerDesc || '';
  document.getElementById('sFooterDesc2').value = siteConfig.footerDesc2 || '';
  var areasText = '';
  for (var i = 0; i < siteConfig.areas.length; i++) {
    var a = siteConfig.areas[i];
    areasText += a.key + ':' + a.label + (a.hot ? ':hot' : '') + '\n';
  }
  document.getElementById('sAreas').value = areasText.trim();
  var qrHint = document.getElementById('qrUploadHint');
  if (siteConfig.wechatQrImg && siteConfig.wechatQrImg.indexOf('data:') !== 0) {
    qrHint.innerHTML = '<img src="' + siteConfig.wechatQrImg + '?_t=' + Date.now() + '" alt="二维码" style="max-height:80px;"><small>点击重新上传</small>';
  } else if (siteConfig.wechatQrImg && siteConfig.wechatQrImg.indexOf('data:') === 0) {
    qrHint.innerHTML = '<img src="' + siteConfig.wechatQrImg + '" alt="二维码" style="max-height:80px;"><small>已选新图片，点击重新上传</small>';
  } else {
    qrHint.innerHTML = '点击上传二维码<small>建议200x200以上</small>';
  }
}

// 微信二维码上传
document.getElementById('qrFileInput').addEventListener('change', function() {
  if (!this.files || !this.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    pendingQrImage = e.target.result;
    document.getElementById('qrUploadHint').innerHTML = '<img src="' + e.target.result + '" alt="二维码" style="max-height:80px;"><small>已选择新图片，保存时生效</small>';
  };
  reader.readAsDataURL(this.files[0]);
});

document.getElementById('saveSettingsBtn').addEventListener('click', function() {
  siteConfig.heroTitle = document.getElementById('sHeroTitle').value.trim();
  siteConfig.heroHighlight = document.getElementById('sHeroHighlight').value.trim();
  siteConfig.heroSubtitle = document.getElementById('sHeroSubtitle').value.trim();
  siteConfig.phone = document.getElementById('sPhone').value.trim();
  siteConfig.footerTitle = document.getElementById('sFooterTitle').value.trim();
  siteConfig.footerDesc = document.getElementById('sFooterDesc').value.trim();
  siteConfig.footerDesc2 = document.getElementById('sFooterDesc2').value.trim();
  var areasText = document.getElementById('sAreas').value.trim();
  var newAreas = [];
  var lines = areasText.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var parts = line.split(':');
    if (parts.length >= 2) {
      newAreas.push({key: parts[0].trim(), label: parts[1].trim(), hot: parts.length > 2 && parts[2].trim() === 'hot'});
    }
  }
  if (newAreas.length > 0) siteConfig.areas = newAreas;
  if (pendingQrImage) {
    siteConfig.wechatQrImg = pendingQrImage;
    siteConfig._qrPending = true;
    pendingQrImage = null;
  }
  saveSiteConfig(siteConfig);
  showToast('设置已保存，记得点发布同步到线上', 'success');
});
