<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房源管理后台</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:#f0f2f5; color:#1a1a2e; -webkit-font-smoothing:antialiased;
    }

    /* ===== 登录页 ===== */
    .login-wrap {
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .login-box {
      background:#fff; border-radius:16px; padding:40px; width:90%; max-width:360px;
      box-shadow:0 20px 60px rgba(0,0,0,.3); text-align:center;
    }
    .login-box h2 { font-size:22px; margin-bottom:8px; }
    .login-box .sub { font-size:13px; color:#7f8c9b; margin-bottom:24px; }
    .login-box input[type="password"] {
      width:100%; border:1.5px solid #e8ecf1; border-radius:10px; padding:12px 16px;
      font-size:15px; outline:none; font-family:inherit; text-align:center; letter-spacing:4px;
    }
    .login-box input[type="password"]:focus { border-color:#4f6ef7; }
    .login-box .login-btn {
      width:100%; margin-top:16px; padding:12px; border:none; border-radius:10px;
      background:#4f6ef7; color:#fff; font-size:16px; font-weight:600; cursor:pointer;
      font-family:inherit;
    }
    .login-box .login-btn:hover { background:#3d5bd6; }
    .login-box .err { color:#f56c6c; font-size:12px; margin-top:8px; display:none; }

    /* ===== 管理后台 ===== */
    .admin { display:none; }
    .admin-header {
      background:#fff; padding:16px 24px; border-bottom:1px solid #e8ecf1;
      display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;
    }
    .admin-header h1 { font-size:18px; font-weight:700; }
    .admin-header .actions { display:flex; gap:10px; }
    .btn {
      padding:8px 18px; border:none; border-radius:8px; font-size:13px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:all .15s;
    }
    .btn-primary { background:#4f6ef7; color:#fff; }
    .btn-primary:hover { background:#3d5bd6; }
    .btn-success { background:#67c23a; color:#fff; }
    .btn-success:hover { background:#5daf34; }
    .btn-danger { background:#f56c6c; color:#fff; }
    .btn-danger:hover { background:#dd5a5a; }
    .btn-outline { background:#fff; color:#7f8c9b; border:1.5px solid #e8ecf1; }
    .btn-outline:hover { border-color:#4f6ef7; color:#4f6ef7; }
    .btn-sm { padding:5px 12px; font-size:12px; }
    .btn:disabled { opacity:.5; pointer-events:none; }

    .admin-body { max-width:900px; margin:0 auto; padding:20px; }

    /* 楼盘列表 */
    .prop-list { display:flex; flex-direction:column; gap:12px; }
    .prop-item {
      background:#fff; border-radius:12px; padding:16px; display:flex; gap:16px;
      align-items:center; box-shadow:0 1px 4px rgba(0,0,0,.04); transition:box-shadow .15s;
    }
    .prop-item:hover { box-shadow:0 4px 12px rgba(0,0,0,.08); }
    .prop-thumb {
      width:80px; height:60px; border-radius:8px; overflow:hidden; flex-shrink:0;
      background:linear-gradient(135deg,#e8ecf1,#d5dae3); display:flex; align-items:center; justify-content:center;
    }
    .prop-thumb img { width:100%; height:100%; object-fit:cover; }
    .prop-thumb .no-img { font-size:10px; color:#b0b8c4; }
    .prop-info { flex:1; min-width:0; }
    .prop-info h3 { font-size:15px; font-weight:600; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .prop-info .meta { font-size:12px; color:#7f8c9b; display:flex; gap:12px; flex-wrap:wrap; }
    .prop-info .meta span { white-space:nowrap; }
    .prop-actions { display:flex; gap:6px; flex-shrink:0; }

    /* 编辑弹窗 */
    .overlay {
      position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.5);
      z-index:1000; display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .2s;
    }
    .overlay.show { opacity:1; pointer-events:auto; }
    .edit-box {
      background:#fff; border-radius:16px; width:94%; max-width:560px; max-height:90vh;
      overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2);
    }
    .edit-header {
      padding:20px 24px 0; display:flex; align-items:center; justify-content:space-between;
    }
    .edit-header h2 { font-size:18px; font-weight:700; }
    .edit-close {
      background:none; border:none; font-size:24px; cursor:pointer; color:#7f8c9b; padding:4px;
    }
    .edit-body { padding:20px 24px 24px; }
    .form-group { margin-bottom:16px; }
    .form-group label {
      display:block; font-size:12px; font-weight:600; color:#7f8c9b; margin-bottom:6px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; border:1.5px solid #e8ecf1; border-radius:8px; padding:10px 12px;
      font-size:14px; font-family:inherit; outline:none; color:#1a1a2e;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color:#4f6ef7;
    }
    .form-group textarea { resize:vertical; min-height:60px; }
    .form-row { display:flex; gap:12px; }
    .form-row .form-group { flex:1; }
    .img-upload-area {
      border:2px dashed #e8ecf1; border-radius:12px; padding:24px; text-align:center;
      cursor:pointer; transition:border-color .15s; position:relative; overflow:hidden;
    }
    .img-upload-area:hover { border-color:#4f6ef7; }
    .img-upload-area img { width:100%; max-height:160px; object-fit:contain; border-radius:8px; }
    .img-upload-area .upload-hint { font-size:13px; color:#b0b8c4; }
    .img-upload-area .upload-hint small { display:block; font-size:11px; margin-top:4px; }
    .img-upload-area input[type="file"] {
      position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;
    }

    /* 发布状态 */
    .publish-bar {
      background:#fff; border-top:1px solid #e8ecf1; padding:12px 24px;
      position:fixed; bottom:0; left:0; right:0; display:flex; align-items:center;
      justify-content:space-between; z-index:50; box-shadow:0 -2px 8px rgba(0,0,0,.04);
    }
    .publish-bar .status { font-size:13px; color:#7f8c9b; }
    .publish-bar .status .changed { color:#e6a23c; font-weight:600; }
    .publish-bar .status .published { color:#67c23a; font-weight:600; }

    /* 提示条 */
    .toast {
      position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px);
      background:#1a1a2e; color:#fff; padding:12px 24px; border-radius:10px; font-size:14px;
      font-weight:600; z-index:9999; transition:transform .3s; box-shadow:0 8px 24px rgba(0,0,0,.2);
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.success { background:#67c23a; }
    .toast.error { background:#f56c6c; }

    /* 响应式 */
    @media (max-width:600px) {
      .admin-header { flex-direction:column; gap:10px; }
      .prop-item { flex-direction:column; align-items:flex-start; }
      .prop-actions { width:100%; justify-content:flex-end; }
      .form-row { flex-direction:column; gap:0; }
      .edit-box { width:100%; max-width:100%; max-height:100vh; border-radius:0; }
    }
  </style>
</head>
<body>

<!-- 登录页 -->
<div class="login-wrap" id="loginPage">
    <div class="login-box">
    <h2>房源管理后台</h2>
    <div class="sub">请输入管理密码和发布令牌</div>
    <input type="password" id="loginPwd" placeholder="管理密码" style="margin-bottom:10px;" autofocus>
    <input type="password" id="loginToken" placeholder="GitHub发布令牌（ghp_开头）">
    <div class="err" id="loginErr">密码错误，请重试</div>
    <button class="login-btn" onclick="tryLogin()">进入后台</button>
    <div style="margin-top:12px;font-size:11px;color:#b0b8c4;">发布令牌仅在本次会话中使用，不会保存</div>
  </div>
</div>

<!-- 管理后台 -->
<div class="admin" id="adminPage">
  <div class="admin-header">
    <h1>房源管理</h1>
    <div class="actions">
      <button class="btn btn-outline" onclick="openEdit(-1)">+ 新增楼盘</button>
      <button class="btn btn-outline" onclick="logout()">退出</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="prop-list" id="propList"></div>
  </div>
  <div class="publish-bar">
    <div class="status" id="pubStatus">暂无修改</div>
    <button class="btn btn-success" id="pubBtn" onclick="publishAll()" disabled>发布到线上</button>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="overlay" id="editOverlay">
  <div class="edit-box">
    <div class="edit-header">

      </div>
      <div class="form-group">
        <label>楼盘名称</label>

          <label>区域</label>

            <option value="xixiang">西乡</option>
            <option value="nanshan-tech">南山科技园</option>

          <label>租金（元/㎡/月）</label>
          <input type="text" id="fRent" placeholder="如：160-270 或 面议">
        </div>
      </div>
      <div class="form-row">

        <div class="form-group">

      </div>
      <div class="form-row">
        <div class="form-group">
          <label>开发商</label>
          <input type="text" id="fDev" placeholder="选填">
        </div>
        <div class="form-group">
          <label>物业公司</label>

      </div>
      <div class="form-group">
        <label>楼层数</label>

      <div class="form-group">
        <label>标签（逗号分隔）</label>
        <input type="text" id="fTags" placeholder="如：超甲级,近地铁,品牌开发商">
      </div>
      <div class="form-group">
        <label>楼盘亮点（每行一条）</label>

      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <button class="btn btn-outline" onclick="closeEdit()">取消</button>
        <button class="btn btn-primary" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ========== 数据管理 ==========
function loadProperties() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  return JSON.parse(JSON.stringify(defaultProperties));
}

function saveProperties(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  markChanged();
}

var properties = loadProperties();

// ========== 登录 ==========
function tryLogin() {
  var pwd = document.getElementById('loginPwd').value;
  var token = document.getElementById('loginToken').value.trim();
  if (pwd === ADMIN_PWD) {
    GITHUB_TOKEN = token;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    renderList();
    if (!token) {
      showToast('未输入发布令牌，编辑功能可用但无法发布到线上', 'error');
    }
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginPwd').value = '';
    document.getElementById('loginPwd').focus();
  }
}
document.getElementById('loginPwd').addEventListener('keydown', function(e) {
  if (e.keyCode === 13) tryLogin();
});
document.getElementById('loginToken').addEventListener('keydown', function(e) {
  if (e.keyCode === 13) tryLogin();
});

function logout() {
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginPwd').value = '';
}

// ========== 列表渲染 ==========
var areaLabels = {'qianhai':'前海','baoan-center':'宝安中心','xixiang':'西乡','nanshan-tech':'南山科技园'};

function renderList() {
  var html = '';
  for (var i = 0; i < properties.length; i++) {
    var p = properties[i];
    var areaLabel = areaLabels[p.area] || p.area;
    var rentLabel = p.rent === '面议' ? '面议' : p.rent + ' 元/㎡/月';
    var imgHtml = p.img ? '<img src="'+p.img+'" alt="'+p.name+'">' : '<div class="no-img">无图</div>';

    html += '<div class="prop-item">'
      +'<div class="prop-thumb">'+imgHtml+'</div>'
      +'<div class="prop-info">'
      +'<h3>'+p.name+'</h3>'
      +'<div class="meta">'
      +'<span>'+areaLabel+'</span>'
      +'<span>'+rentLabel+'</span>'
      +'<span>'+p.metro+'</span>'
      +'</div></div>'
      +'<div class="prop-actions">'
      +'<button class="btn btn-outline btn-sm" onclick="openEdit('+i+')">编辑</button>'
      +'<button class="btn btn-danger btn-sm" onclick="deleteProp('+i+')">删除</button>'
      +'</div></div>';
  }
  if (properties.length === 0) {
    html = '<div style="text-align:center;padding:60px 20px;color:#b0b8c4;">暂无楼盘，点击右上角"新增楼盘"添加</div>';
  }
  document.getElementById('propList').innerHTML = html;
}

// ========== 编辑弹窗 ==========
var editingIndex = -1; // -1 = 新增

function openEdit(idx) {
  editingIndex = idx;
  var p = idx >= 0 ? properties[idx] : null;

  document.getElementById('editTitle').textContent = p ? '编辑楼盘' : '新增楼盘';
  document.getElementById('fName').value = p ? p.name : '';
  document.getElementById('fArea').value = p ? p.area : 'qianhai';
  document.getElementById('fRent').value = p ? p.rent : '';
  document.getElementById('fRentNote').value = p ? p.rentNote : '';
  document.getElementById('fSize').value = p ? p.sizeRange : '';
  document.getElementById('fAddr').value = p ? p.address : '';
  document.getElementById('fMetro').value = p ? p.metro : '';
  document.getElementById('fContact').value = p ? p.contact : '13500000000';
  document.getElementById('fDev').value = p ? p.developer : '';
  document.getElementById('fProp').value = p ? p.property : '';
  document.getElementById('fFloors').value = p ? p.floors : '';
  document.getElementById('fTags').value = p ? p.tags.join(',') : '';
  document.getElementById('fHighlights').value = p ? p.highlights.join('\n') : '';

  // 图片预览
  var uploadArea = document.getElementById('uploadArea');
  var uploadHint = document.getElementById('uploadHint');
  if (p && p.img) {
    uploadHint.innerHTML = '<img src="'+p.img+'" alt="预览"><small>点击重新上传</small>';
  } else {
    uploadHint.innerHTML = '点击上传图片<small>建议宽度1080px以上，支持jpg/png</small>';
  }
  document.getElementById('imgFileInput').value = '';

  document.getElementById('editOverlay').classList.add('show');
}

function closeEdit() {
  document.getElementById('editOverlay').classList.remove('show');
  editingIndex = -1;
  pendingImages = {};
}
document.getElementById('editOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeEdit();
});

// 图片选择处理
function onImgSelect(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result;
    // 预览
    var uploadHint = document.getElementById('uploadHint');
    uploadHint.innerHTML = '<img src="'+base64+'" alt="预览"><small>已选择新图片，保存时生效</small>';
    // 暂存
    pendingImages[editingIndex] = base64;
  };
  reader.readAsDataURL(file);
}

function saveEdit() {
  var name = document.getElementById('fName').value.trim();
  if (!name) { showToast('请输入楼盘名称', 'error'); return; }

  var tagsStr = document.getElementById('fTags').value.trim();
  var tags = tagsStr ? tagsStr.split(/[,，]/).filter(function(t){ return t.trim(); }) : [];

  var highlightsStr = document.getElementById('fHighlights').value.trim();
  var highlights = highlightsStr ? highlightsStr.split('\n').filter(function(h){ return h.trim(); }) : [];

  var p = {
    name: name,
    area: document.getElementById('fArea').value,
    rent: document.getElementById('fRent').value.trim() || '面议',
    rentNote: document.getElementById('fRentNote').value.trim(),
    sizeRange: document.getElementById('fSize').value.trim(),
    address: document.getElementById('fAddr').value.trim(),
    metro: document.getElementById('fMetro').value.trim(),
    tags: tags,
    highlights: highlights,
    img: '',
    developer: document.getElementById('fDev').value.trim() || '面议',
    property: document.getElementById('fProp').value.trim() || '面议',
    floors: document.getElementById('fFloors').value.trim() || '面议',
    contact: document.getElementById('fContact').value.trim() || '13500000000'
  };

  // 处理图片
  if (pendingImages[editingIndex]) {
    // 新上传的图片，先用base64预览，发布时上传到GitHub
    p.img = pendingImages[editingIndex];
    p._imgPending = true;
  } else if (editingIndex >= 0 && properties[editingIndex]) {
    p.img = properties[editingIndex].img;
    p._imgPending = properties[editingIndex]._imgPending || false;
  }

  if (editingIndex >= 0) {
    properties[editingIndex] = p;
  } else {
    properties.push(p);
  }

  saveProperties(properties);
  renderList();
  closeEdit();
  showToast('已保存', 'success');
}

function deleteProp(idx) {
  if (!confirm('确定删除"' + properties[idx].name + '"？')) return;
  properties.splice(idx, 1);
  saveProperties(properties);
  renderList();
  showToast('已删除', 'success');
}

// ========== 变更追踪 ==========
function markChanged() {
  HAS_CHANGES = true;
  document.getElementById('pubStatus').innerHTML = '<span class="changed">有未发布的修改</span>';
  document.getElementById('pubBtn').disabled = false;
}

function markPublished() {
  HAS_CHANGES = false;
  document.getElementById('pubStatus').innerHTML = '<span class="published">已发布到线上</span>';
  document.getElementById('pubBtn').disabled = true;
}

// ========== 发布到GitHub ==========
function publishAll() {
  if (!HAS_CHANGES) return;
  if (!GITHUB_TOKEN) {
    showToast('请先输入GitHub发布令牌才能发布', 'error');
    return;
  }

  var btn = document.getElementById('pubBtn');
  btn.disabled = true;
  btn.textContent = '发布中...';

  // 步骤1：上传待处理的图片到GitHub
  var imgUploads = [];
  for (var i = 0; i < properties.length; i++) {
    var p = properties[i];
    if (p._imgPending && p.img && p.img.indexOf('data:') === 0) {
      imgUploads.push(uploadImageToGithub(i, p.img));
    }
  }

  Promise.all(imgUploads).then(function() {
    // 步骤2：生成office.html内容并推送
    return pushOfficeHtml();
  }).then(function() {
    markPublished();
    showToast('发布成功！线上将在几秒内更新', 'success');
    btn.textContent = '发布到线上';
  }).catch(function(err) {
    console.error('发布失败:', err);
    showToast('发布失败：' + (err.message || err), 'error');
    btn.disabled = false;
    btn.textContent = '发布到线上';
  });
}

function uploadImageToGithub(index, base64Data) {
  return new Promise(function(resolve, reject) {
    var parts = base64Data.split(',');
    var mimeType = parts[0].match(/:(.*?);/);
    var ext = 'jpg';
    if (mimeType && mimeType[1]) {
      if (mimeType[1] === 'image/png') ext = 'png';
      else if (mimeType[1] === 'image/jpeg') ext = 'jpg';
      else if (mimeType[1] === 'image/webp') ext = 'webp';
    }
    var rawBase64 = parts[1];
    var timestamp = Date.now();
    var filename = 'images/upload_' + timestamp + '_' + index + '.' + ext;
    var githubPath = filename;

    var xhr = new XMLHttpRequest();
    xhr.open('PUT', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + githubPath);
    xhr.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
      if (xhr.status === 201 || xhr.status === 200) {
        var resp = JSON.parse(xhr.responseText);
        var imgUrl = resp.content.download_url || resp.content.html_url;
        // 更新properties中的img路径
        properties[index].img = filename;
        properties[index]._imgPending = false;
        // 保存到localStorage
        localStorage.setItem(STORAGE_KEY, JSON.stringify(properties));
        resolve(imgUrl);
      } else {
        reject(new Error('图片上传失败: HTTP ' + xhr.status));
      }
    };
    xhr.onerror = function() { reject(new Error('网络错误')); };
    xhr.send(JSON.stringify({
      message: '上传图片: ' + filename,
      branch: GITHUB_BRANCH,
      content: rawBase64
    }));
  });
}

function pushOfficeHtml() {
  return new Promise(function(resolve, reject) {
    // 先获取当前office.html的SHA
    var xhr1 = new XMLHttpRequest();
    xhr1.open('GET', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/office.html?ref=' + GITHUB_BRANCH);
    xhr1.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
    xhr1.setRequestHeader('Accept', 'application/vnd.github.v3+json');
    xhr1.onload = function() {
      if (xhr1.status !== 200) { reject(new Error('获取文件SHA失败')); return; }
      var sha = JSON.parse(xhr1.responseText).sha;

      // 生成新的office.html内容
      var newContent = generateOfficeHtml();

      // 推送到GitHub
      var xhr2 = new XMLHttpRequest();
      xhr2.open('PUT', 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/office.html');
      xhr2.setRequestHeader('Authorization', 'token ' + GITHUB_TOKEN);
      xhr2.setRequestHeader('Content-Type', 'application/json');
      xhr2.onload = function() {
        if (xhr2.status === 200 || xhr2.status === 201) {
          resolve();
        } else {
          reject(new Error('推送office.html失败: HTTP ' + xhr2.status));
        }
      };
      xhr2.onerror = function() { reject(new Error('网络错误')); };
      xhr2.send(JSON.stringify({
        message: '更新房源数据',
        branch: GITHUB_BRANCH,
        sha: sha,
        content: btoa(unescape(encodeURIComponent(newContent)))
      }));
    };
    xhr1.onerror = function() { reject(new Error('网络错误')); };
    xhr1.send();
  });
}

ox">\n    <button class="modal-close" onclick="closeDetail()">&times;</button>\n    <div class="modal-hero" id="modalHero"></div>\n    <div class="modal-content" id="modalContent"></div>\n  </div>\n</div>\n<script>\nvar properties = ' + propsCode + ';\nvar PAGE_SIZE = 12;\nvar currentPage = 1;\nvar filterArea = "all";\nvar searchText = "";\nfunction getFiltered() { var list = []; for (var i = 0; i < properties.length; i++) { var p = properties[i]; if (filterArea !== "all" && p.area !== filterArea) continue; if (searchText && p.name.indexOf(searchText) < 0 && p.address.indexOf(searchText) < 0) continue; list.push(p); } return list; }\nfunction getTagClass(t) { if (t === "近地铁" || t === "地铁上盖") return "tag tag-metro"; if (t === "大面积" || t === "可分割") return "tag tag-hot"; if (t === "政府补贴" || t === "前海政策" || t === "金融专属") return "tag tag-policy"; if (t === "品牌开发商" || t === "品牌物业") return "tag tag-new"; return "tag"; }\nfunction renderList() { var filtered = getFiltered(); var total = filtered.length; var totalPages = Math.ceil(total / PAGE_SIZE) || 1; if (currentPage > totalPages) currentPage = totalPages; var start = (currentPage - 1) * PAGE_SIZE; var pageData = filtered.slice(start, start + PAGE_SIZE); document.getElementById("resultInfo").innerHTML = "共 <strong>" + total + "</strong> 个房源"; var areaLabels = { "qianhai":"前海","baoan-center":"宝安中心","xixiang":"西乡","nanshan-tech":"南山科技园" }; var html = ""; for (var i = 0; i < pageData.length; i++) { var p = pageData[i]; var areaLabel = areaLabels[p.area] || ""; var tagHtml = ""; for (var j = 0; j < p.tags.length && j < 4; j++) { tagHtml += "<span class=\\"" + getTagClass(p.tags[j]) + "\\">" + p.tags[j] + "</span>"; } var rentDisplay = p.rent === "面议" ? "面议" : p.rent + "<small> 元/㎡/月</small>"; html += "<div class=\\"card\\" onclick=\\"showDetail(" + i + ")\\"><div class=\\"card-img\\"><img src=\\"" + p.img + "\\" alt=\\"" + p.name + "\\" onerror=\\"this.style.display=\\'none\\'\\"><div class=\\"area-badge\\">" + areaLabel + " "<h2 style=\\"font-size:20px;font-weight:700;margin-bottom:12px;\\">" + p.name + "</h2><div class=\\"rent-big\\">" + rentDisplay + "</div><div class=\\"rent-note\\">" + p.rentNote + "</div><div style=\\"margin-bottom:12px;\\">" + tagHtml + "</div><div class=\\"info-grid\\"><div class=\\"info-cell\\"><div class=\\"lbl\\">区域</div><div class=\\"val\\">" + areaLabel + "</div></div><div class=\\"info-cell\\"><div class=\\"lbl\\">可租面积</div><div class=\\"val\\">" + p.sizeRange + "㎡</div></div><div class=\\"info-cell\\"><div class=\\"lbl\\">地址</div><div class=\\"val\\" style=\\"font-size:13px;\\">" + p.address + "</div></div><div class=\\"info-cell\\"><div class=\\"lbl\\">最近地铁</div><div class=\\"val\\" style=\\"font-size:13px;\\">" + p.metro + "</div></div><div class=\\"info-cell\\"><div class=\\"lbl\\">开发商</div><div class=\\"val\\" style=\\"font-size:13px;\\">" + p.developer + "</div></div><div class=\\"info-cell\\"><div class=\\"lbl\\">物业公司</div><div class=\\"val\\" style=\\"font-size:13px;\\">" + p.property + "</div></div><div class=\\"info-cell\\"><div class=\\"lbl\\">楼层数</div><div class=\\"val\\">" + p.floors + "</div></div></div><div class=\\"highlights\\"><h4>楼盘亮点</h4><ul>" + hlHtml + "</ul></div><div class=\\"contact-box\\"><div>专业经纪人 · 一对一服务</div><div class=\\"phone\\">" + p.contact + "</div><div class=\\"wechat\\">微信同号，随时预约看房</div></div>"; document.getElementById("detailModal").classList.add("show"); }\nfunction closeDetail() { document.getElementById("detailModal").classList.remove("show"); }\ndocument.getElementById("detailModal").addEventListener("click", function(e) { if (e.target === this) closeDetail(); });\nfunction bindFilter(containerId, callback) { var btns = document.getElementById(containerId).querySelectorAll(".filter-btn"); for (var i = 0; i < btns.length; i++) { btns[i].addEventListener("click", function() { var siblings = this.parentElement.querySelectorAll(".filter-btn"); for (var j = 0; j < siblings.length; j++) siblings[j].classList.remove("active"); this.classList.add("active"); callback(this.getAttribute("data-val")); }); } }\nbindFilter("areaFilter", function(v) { filterArea = v; currentPage = 1; renderList(); });\ndocument.getElementById("searchInput").addEventListener("input", function() { searchText = this.value.trim(); currentPage = 1; renderList(); });\nfunction updateJsonLd() { var items = []; for (var i = 0; i < properties.length; i++) { var p = properties[i]; var priceNum = 0; if (p.rent !== "面议") { var match = p.rent.match(/(\\d+)/); if (match) priceNum = parseInt(match[1]); } var item = { "@type":"ListItem", "position":i+1, "item":{ "@type":"RealEstateListing", "name":p.name, "description":p.name+"，位于"+p.address+"，"+p.metro+(p.rent!=="面议"?"，租金"+p.rent+"元/㎡/月":"，租金面议")+"，"+p.sizeRange+"㎡可租", "url":"https://lverlyly.github.io/work-tracker/office.html", "image":"https://lverlyly.github.io/work-tracker/"+p.img, "address":{ "@type":"PostalAddress", "addressLocality":"深圳", "addressRegion":"广东", "streetAddress":p.address } }; if (priceNum > 0) item.item.priceSpecification = { "@type":"UnitPriceSpecification", "price":priceNum, "priceCurrency":"CNY", "unitCode":"MTK", "description":"元/㎡/月" }; items.push(item); } var jsonLd = { "@context":"https://schema.org", "@type":"ItemList", "name":"深圳宝安南山写字楼出租精选", "description":"深圳宝安南山区优质写字楼办公室租赁房源列表", "numberOfItems":properties.length, "itemListElement":items }; var script = document.querySelector("script[type=\\"application/ld+json\\"]"); if (script) script.textContent = JSON.stringify(jsonLd); }\nupdateJsonLd();\nrenderList();\n<\/script>\n</body>\n</html>';
}
